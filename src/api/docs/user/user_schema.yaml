LoginResult:
  type: object
  properties:
    user_info:
      $ref: "#/UserInfo"
    permissions:
      type: array
      items:
        type: string
      example:
        - teapot
    token:
      type: string
      example: some token...
    expires_at:
      type: integer
      format: int64
      example: 1

UserInfo:
  type: object
  properties:
    mobile:
      type: string
      example: "09120000000"
    email:
      type: string
      format: email
      example: example.mail.com
    national_code:
      type: string
      nullable: true
      example: null
    birthdate:
      type: string
      format: date-time
      nullable: true
      example: null

Users:
  type: object
  properties:
    page:
      type: integer
      example: 20
    size:
      type: integer
      example: 0
    count:
      type: integer
      example: 153
    items:
      type: array
      items:
        $ref: "./user_schema.yaml#/UserInfo"
