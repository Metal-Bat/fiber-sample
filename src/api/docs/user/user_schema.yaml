LoginPayload:
  type: object
  required:
    - mobile
    - password
  properties:
    mobile:
      type: string
      example: "09120000000"
    password:
      type: string
      example: secret

LoginResult:
  type: object
  properties:
    user_info:
      $ref: "#/UserInfo"
    permissions:
      type: array
      items:
        type: string
      example:
        - teapot
    token:
      type: string
      example: some token...
    expires_at:
      type: integer
      format: int64
      example: 1

UserInfo:
  type: object
  properties:
    mobile:
      type: string
      example: "09120000000"
    email:
      type: string
      format: email
      example: example.mail.com
    national_code:
      type: string
      nullable: true
      example: null
    birthdate:
      type: string
      format: date-time
      nullable: true
      example: null

Users:
  type: object
  properties:
    page:
      type: integer
      example: 20
    size:
      type: integer
      example: 0
    count:
      type: integer
      example: 153
    items:
      type: array
      items:
        $ref: "./user_schema.yaml#/UserInfo"

UserDetail:
  type: object
  properties:
    id:
      type: integer
      format: uint64
      example: 1
    mobile:
      type: string
      example: "09396168479"
    email:
      type: string
      format: email
      example: user@example.com
    national_code:
      type: string
      nullable: true
      example: "1234567890"
    birthdate:
      type: string
      format: date-time
      nullable: true
      example: "1995-01-01T00:00:00Z"
    created_at:
      type: string
      format: date-time
      example: "2024-01-01T10:00:00Z"
    updated_at:
      type: string
      format: date-time
      example: "2024-01-10T12:00:00Z"
    deleted_at:
      type: string
      format: date-time
      nullable: true
      example: null
    permissions:
      type: array
      items:
        type: string

CreateUserPayload:
  type: object
  required:
    - mobile
    - email
    - password
  properties:
    mobile:
      type: string
      example: "09121234567"
      description: User mobile number (required)
    email:
      type: string
      format: email
      example: user@example.com
      description: User email (required)
    password:
      type: string
      format: password
      description: User password (required)
    national_code:
      type: string
      nullable: true
      example: "1234567890"
      description: User national code (optional)
    birthdate:
      type: string
      format: date-time
      nullable: true
      example: "1995-01-01T00:00:00Z"
      description: User birthdate (optional)

UpdateUserPayload:
  type: object
  properties:
    email:
      type: string
      format: email
      nullable: true
      example: user@example.com
      description: User email (optional)
    password:
      type: string
      format: password
      nullable: true
      description: User password (optional)
    national_code:
      type: string
      nullable: true
      example: "1234567890"
      description: User national code (optional)
    birthdate:
      type: string
      format: date-time
      nullable: true
      example: "1995-01-01T00:00:00Z"
      description: User birthdate (optional)
