login:
  post:
    tags:
      - user

    parameters:
      - $ref: "../base/parameters.yaml#/LanguageHeader"
      - $ref: "../base/parameters.yaml#/RequestIdHeader"

    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "./requests.yaml#/LoginInput"

    responses:
      "200":
        $ref: "./responses.yaml#/LoginResponse"

      "400":
        $ref: "../base/responses.yaml#/BadRequest"

      "401":
        $ref: "../base/responses.yaml#/Unauthorized"

      "403":
        $ref: "../base/responses.yaml#/Forbidden"

      "404":
        $ref: "../base/responses.yaml#/NotFound"

      "422":
        $ref: "../base/responses.yaml#/ValidationError"

users:
  get:
    tags:
      - user

    parameters:
      - $ref: "../base/parameters.yaml#/LimitPaginationQuery"
      - $ref: "../base/parameters.yaml#/OffsetPaginationQuery"

    responses:
      "200":
        $ref: "./responses.yaml#/UsersPaginatedResponse"

      "400":
        $ref: "../base/responses.yaml#/BadRequest"

      "401":
        $ref: "../base/responses.yaml#/Unauthorized"

      "403":
        $ref: "../base/responses.yaml#/Forbidden"

      "404":
        $ref: "../base/responses.yaml#/NotFound"

      "422":
        $ref: "../base/responses.yaml#/ValidationError"

  post:
    tags:
      - user

    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "./requests.yaml#/CreateUserRequest"

    responses:
      "201":
        $ref: "./responses.yaml#/UsersDetailCreateResponse"

      "400":
        $ref: "../base/responses.yaml#/BadRequest"

      "401":
        $ref: "../base/responses.yaml#/Unauthorized"

      "403":
        $ref: "../base/responses.yaml#/Forbidden"

      "404":
        $ref: "../base/responses.yaml#/NotFound"

      "422":
        $ref: "../base/responses.yaml#/ValidationError"

detail:
  get:
    tags:
      - user

    parameters:
      - $ref: "../base/parameters.yaml#/UrlDetail"

    responses:
      "200":
        $ref: "./responses.yaml#/UsersDetailResponse"

      "400":
        $ref: "../base/responses.yaml#/BadRequest"

      "401":
        $ref: "../base/responses.yaml#/Unauthorized"

      "403":
        $ref: "../base/responses.yaml#/Forbidden"

      "404":
        $ref: "../base/responses.yaml#/NotFound"

      "422":
        $ref: "../base/responses.yaml#/ValidationError"
