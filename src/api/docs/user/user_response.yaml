LoginResponse:
  description: "User Login Response"
  content:
    application/json:
      schema:
        LoginResponse:
          type: object
          properties:
            code:
              type: integer
              example: 200
            error:
              type: string
              nullable: true
              example: null
            result:
              $ref: "./user_schema.yaml#/LoginResult"
            success:
              type: boolean
              example: true

