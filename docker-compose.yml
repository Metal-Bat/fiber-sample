volumes:
  sample_local_postgres_data: {}
  sample_local_pgadmin_data: {}
  sample_local_redis_data: {}
  sample_local_logs_data: {}

services:
  backend:
    build:
      context: .
      dockerfile: ./compose/backend/Dockerfile
    image: sample_local_backend
    container_name: sample_local_backend
    depends_on:
      - postgres
      - redis
      - otel-collector
    volumes:
      - ./src:/app/src:z
    env_file:
      - ./.envs/.local/.backend
    ports:
      - "8000:8000"
    command: /start

  postgres:
    build:
      context: .
      dockerfile: ./compose/postgres/Dockerfile
    image: sample_local_postgres
    container_name: sample_local_postgres
    ports:
      - 5432:5342
    volumes:
      - sample_local_postgres_data:/var/lib/postgresql
    env_file:
      - ./.envs/.local/.postgres
    attach: false

  pgadmin:
    build:
      context: .
      dockerfile: ./compose/pgadmin/Dockerfile
    image: sample_local_pgadmin
    container_name: sample_local_pgadmin
    ports:
      - 5050:80
    volumes:
      - sample_local_pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    env_file:
      - ./.envs/.local/.pgadmin
    attach: false

  redis:
    build:
      context: .
      dockerfile: ./compose/redis/Dockerfile
    image: sample_local_redis
    container_name: sample_local_redis
    volumes:
      - sample_local_redis_data:/data
    attach: false

  jaeger:
    build:
      context: .
      dockerfile: ./compose/jaeger/Dockerfile
    image: sample_local_jaeger
    container_name: sample_local_jaeger
    ports:
      - "16686:16686"
    attach: false

  otel-collector:
    build:
      context: .
      dockerfile: ./compose/collector/Dockerfile
    image: sample_local_collector
    container_name: sample_local_collector
    depends_on:
      - jaeger
    command: ["--config", "/etc/otel-collector-config.yaml"]
    attach: false
